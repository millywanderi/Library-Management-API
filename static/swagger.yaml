swagger: '2.0'
info:
  title: "Library API"
  description: "API to manage library system"
  version: "1.0.0"
host: "127.0.0.1.500"
schemes: 
  - "https"
consumes:
  - "application/json"
produces:
  - "application/json"

securityDefinitions: 
  bearerAuth: 
    type: "apiKey" 
    name: "Authorization" 
    in: "header"

paths: 
  /members/login: 
    post: 
      tags: 
        - "Members" 
      
      summary: "Login endpoint" 
      description: "Validates member credentials and returns an authentication token."

      parameters: 
        - in: "body" 
          name: "body" 
          description: "Login credentials" 
          required: true 

          schema: 
            $ref: "#/definitions/LoginCredentials"

      responses: 
        200: 
          description: "Login successful" 

          schema: 
            $ref: "#/definitions/LoginResponse"

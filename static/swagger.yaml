swagger: '2.0'
info:
  title: "Library API"
  description: "API to manage library system"
  version: "1.0.0"
host: "library-management-api-pguh.onrender.com"
schemes: 
  - "https"
consumes:
  - "application/json"
produces:
  - "application/json"

securityDefinitions: 
  bearerAuth: 
    type: "apiKey" 
    name: "Authorization" 
    in: "header"

paths: 
  /members/login: 
    post: 
      tags: 
        - "Members" 
      
      summary: "Login endpoint" 
      description: "Validates member credentials and returns an authentication token."

      parameters: 
        - in: "body" 
          name: "body" 
          description: "Login credentials" 
          required: true 

          schema: 
            $ref: "#/definitions/LoginCredentials"

      responses: 
        200: 
          description: "Login successful" 

          schema: 
            $ref: "#/definitions/LoginResponse"

  /members: 

    post: 
      tags: 
        - "Members" 
    
      summary: "Create a new member" 
      description: "Registers a new library member. Email must be unique."

    parameters: 
      - in: "body" 
        name: "body" 
        description: "Member information" 
        required: true 

        schema: 
          $ref: "#/definitions/CreateMemberPayload"

      responses: 
        201: 
          description: "Member created successfully" 

        schema: 
          $ref: "#/definitions/CreateMemberResponse"

    get: 
      tags: 
        - "Members" 

      summary: "Get all members" 
      description: "Retrieve a list of all library members." 

      responses: 
        200: 
        description: "Members retrieved successfully" 

        schema: 
          $ref: "#/definitions/AllMembers"

    put: 
      tags: 
        - "Members" 

      summary: "Update member" 
      description: "Update a member account. Requires authentication." 
      
      security: - bearerAuth: [] 

      parameters: 
        - in: "body" 
          name: "body" 
          description: "Updated member information" 
          required: true 

          schema: 
            $ref: "#/definitions/UpdateMemberPayload" 

      responses: 
        200: 
          description: "Member updated successfully" 

          schema: 
            $ref: "#/definitions/UpdateMemberResponse"

    delete: 
      tags: 
        - "Members" 

      summary: "Delete member" 
      description: "Delete a member account. Requires authentication." 

      security: - bearerAuth: [] 

      responses: 
        200: 
          description: "Member deleted successfully" 

          schema: 
            $ref: "#/definitions/DeleteMemberResponse"

definitions: 
  
  LoginCredentials: 
    type: "object" 

    required: 
      - "email" 
      - "password"

    properties: 
      email: 
        type: "string" 

      password: 
        type: "string"

  LoginResponse: 
    type: "object" 

    properties: 
      token: 
        type: "string" 

      message: 
        type: "string" 

      status: 
        type: "string"

  CreateMemberPayload: 
    type: "object" 

    required: 
      - "name" 
      - "email" 
      - "DOB" 
      - "password" 

    properties: 
      name: 
        type: "string" 

      email: 
        type: "string" 

      DOB: 
        type: "string" 
        format: "date" 

      password: 
        type: "string"

  CreateMemberResponse: 
    type: "object" 

    properties: 
      id: 
        type: "integer" 

      name: 
        type: "string" 

      email: 
        type: "string" 

      DOB: 
        type: "string" 

      password: 
        type: "string"

  AllMembers: 
    type: "array" 

    items: 
      type: "object" 

      properties: 
        id: 
          type: "integer" 

        name: 
          type: "string" 

        email: 
          type: "string" 

        DOB: 
          type: "string" 

        password: 
          type: "string"


